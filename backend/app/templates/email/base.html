<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject | default('AP Studios') }}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0D0810; color: #C8B8CC; line-height: 1.6; }
  .wrapper { max-width: 580px; margin: 0 auto; padding: 40px 20px; }
  .header { text-align: center; padding-bottom: 32px; border-bottom: 1px solid rgba(107,26,46,0.3); margin-bottom: 32px; }
  .logo { font-size: 24px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #ffffff; }
  .logo span { color: #A8385A; }
  .logo-sub { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #8A7A90; margin-top: 4px; }
  .card { background: #1E1025; border: 1px solid rgba(107,26,46,0.3); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  .card-header { background: linear-gradient(135deg, #6B1A2E 0%, #4A1F52 100%); padding: 24px 28px; }
  .card-header-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .card-header h1 { font-size: 22px; font-weight: 300; color: #ffffff; letter-spacing: 0.02em; line-height: 1.3; }
  .card-header p { font-size: 14px; color: rgba(200,184,204,0.8); margin-top: 6px; }
  .card-body { padding: 24px 28px; }
  .greeting { font-size: 16px; color: #C8B8CC; margin-bottom: 16px; }
  .message { font-size: 15px; color: #8A7A90; margin-bottom: 24px; line-height: 1.7; }
  .highlight-box { background: rgba(107,26,46,0.15); border: 1px solid rgba(107,26,46,0.3); border-radius: 8px; padding: 16px 20px; margin: 16px 0; }
  .highlight-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #8A7A90; margin-bottom: 4px; }
  .highlight-value { font-size: 18px; color: #ffffff; font-weight: 300; }
  .highlight-value.gold { color: #E8C98A; }
  .highlight-value.green { color: #5DBF8A; }
  .data-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  .data-table td { padding: 10px 0; font-size: 14px; border-bottom: 1px solid rgba(107,26,46,0.15); }
  .data-table td:first-child { color: #8A7A90; width: 45%; }
  .data-table td:last-child { color: #C8B8CC; }
  .data-table tr:last-child td { border-bottom: none; }
  .cta-button { display: inline-block; background: linear-gradient(135deg, #6B1A2E 0%, #8B2A42 100%); color: #ffffff !important; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-size: 13px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; margin: 8px 0; }
  .divider { height: 1px; background: linear-gradient(90deg,transparent 0%, rgba(107,26,46,0.5) 40%, rgba(201,169,110,0.3) 60%, transparent 100%); margin: 24px 0; }
  .footer { text-align: center; padding-top: 24px; border-top: 1px solid rgba(107,26,46,0.2); }
  .footer p { font-size: 12px; color: #8A7A90; margin-bottom: 4px; }
  .footer a { color: #A8385A; text-decoration: none; }
  .dpid { display: inline-block; margin-top: 8px; font-size: 9px; letter-spacing: 0.15em; color: rgba(107,26,46,0.6); text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo">AP <span>Studios</span></div>
    <div class="logo-sub">Music Distribution Platform</div>
  </div>

  {% block content %}{% endblock %}

  <div class="divider"></div>

  <div class="footer">
    <p>AP Studios Distribution · ADRC Producciones</p>
    <p>
      <a href="{{ frontend_url }}">Portal</a> ·
      <a href="{{ frontend_url }}/artist/profile">Preferencias</a> ·
      <a href="mailto:{{ support_email }}">Soporte</a>
    </p>
    <div class="dpid">DPID: PA-DPIDA-202402050E-4</div>
  </div>
</div>
</body>
</html>
