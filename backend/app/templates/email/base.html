<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ subject | default('AP Studios') }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #0D0810;
      color: #C8B8CC;
      line-height: 1.6;
      padding: 24px 12px;
    }
    .wrapper { max-width: 620px; margin: 0 auto; }
    .brand {
      text-align: center;
      margin-bottom: 16px;
    }
    .brand h1 {
      font-size: 24px;
      color: #fff;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .brand h1 span { color: #A8385A; }
    .brand p {
      font-size: 11px;
      letter-spacing: .18em;
      color: #8A7A90;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .card {
      background: #1E1025;
      border: 1px solid rgba(107,26,46,.35);
      border-radius: 12px;
      overflow: hidden;
    }
    .head {
      background: linear-gradient(135deg,#6B1A2E 0%,#4A1F52 100%);
      padding: 20px 22px;
      color: #fff;
    }
    .head h2 { font-size: 22px; font-weight: 300; }
    .head p { margin-top: 4px; color: rgba(255,255,255,.78); font-size: 13px; }
    .body { padding: 20px 22px; }
    .muted { color: #8A7A90; font-size: 13px; }
    .btn {
      display: inline-block;
      margin-top: 10px;
      background: #6B1A2E;
      color: #fff !important;
      text-decoration: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .table td {
      padding: 8px 0;
      border-bottom: 1px solid rgba(107,26,46,.2);
      font-size: 14px;
    }
    .table td:first-child { color: #8A7A90; width: 45%; }
    .table td:last-child { color: #E7DCE9; }
    .table tr:last-child td { border-bottom: none; }
    .footer {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: #8A7A90;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <h1>AP <span>Studios</span></h1>
      <p>Music Distribution Platform</p>
    </div>

    <div class="card">
      {% block content %}{% endblock %}
    </div>

    <div class="footer">
      AP Studios Distribution ·
      <a href="{{ frontend_url }}" style="color:#A8385A;text-decoration:none;">Portal</a> ·
      <a href="mailto:{{ support_email }}" style="color:#A8385A;text-decoration:none;">Soporte</a>
    </div>
  </div>
</body>
</html>
